# electron-builder — PCT dev builds (M1e-6). No code signing in v1 (design §Packaging); the README
# documents the SmartScreen/Gatekeeper "unidentified developer" steps. Installers land in dist/
# (gitignored). buildResources is resources/ — deliberately NOT build/, which PCT uses as a scratch
# target for `npm run export`. Production node_modules are pulled in automatically by electron-builder;
# `files` only needs to allow the electron-vite output + package.json.
appId: com.jlgabriel.pct
productName: PCT
copyright: © 2026 Juan Luis Gabriel — GPL-3.0-or-later

directories:
  buildResources: resources
  output: dist

files:
  - out/**
  - package.json
  - LICENSE
  - THIRD_PARTY_NOTICES.md
  - "!**/*.map"

# Bundled binary assets copied to <resourcesPath>/assets, read at export time by anchorAsset.ts: the
# v0.4 plant anchor mesh (pct_anchor.tmb) + its texture (pct_anchor.ttx). OUR content run through IPACS's
# official converter — see assets/ and forum #136. (The files are gitignored until the licence is
# confirmed; they must be present on disk to package a v0.4 release.)
extraResources:
  - from: assets
    to: assets

asar: true
# No native modules → nothing to rebuild against Electron's ABI.
npmRebuild: false

win:
  target:
    - target: nsis
      arch: [x64]
    - target: portable
      arch: [x64]

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}

portable:
  artifactName: ${name}-${version}-portable.${ext}

# macOS builds must be produced on a Mac (dmg/zip can't be created from Windows). Both arches so
# Apple-silicon (e.g. an M4) and Intel are covered. Unsigned → Gatekeeper right-click-Open.
mac:
  target:
    - target: dmg
      arch: [arm64, x64]
    - target: zip
      arch: [arm64, x64]
  category: public.app-category.utilities

dmg:
  artifactName: ${name}-${version}-${arch}.${ext}

linux:
  target:
    - AppImage
  category: Utility
  artifactName: ${name}-${version}.${ext}
